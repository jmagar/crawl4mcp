  crawl4mcp:
    container_name: crawl4mcp
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8051}:${PORT:-8051}"
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8051}
      - TRANSPORT=${TRANSPORT:-sse}
      
      # Self-Hosted Embedding Server (Required)
      - EMBEDDING_SERVER_URL=${EMBEDDING_SERVER_URL:-http://localhost:8080}
      
      # Qdrant Configuration (Required)
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-crawled_pages}
      - VECTOR_DIM=${VECTOR_DIM:-1024}
      
      # OpenAI Configuration (Optional - for contextual summaries)
      # Set OPENAI_API_KEY and SUMMARIZATION_MODEL_CHOICE in .env to enable summaries
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SUMMARIZATION_MODEL_CHOICE=${SUMMARIZATION_MODEL_CHOICE:-}
